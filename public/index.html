<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#88c47c">
    
    <title>Robo Joey Controller</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="joey-cover.png">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #88c47c; /* Match your manifest theme */
            --btn-color: #333;
            --audio-color: #ff9100;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Prevent scrolling/bounce on mobile */
            position: fixed; 
            width: 100%;
            touch-action: none;
        }

        #status {
            margin-bottom: 25px;
            padding: 8px 20px;
            border-radius: 25px;
            background: #222;
            font-size: 0.85rem;
            border: 1px solid #444;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .connected { 
            color: var(--accent-color); 
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 10px rgba(136, 196, 124, 0.3);
        }

        /* 3x3 Control Grid */
        .controller-grid {
            display: grid;
            grid-template-columns: repeat(3, 95px);
            grid-template-rows: repeat(3, 95px);
            gap: 15px;
        }

        .btn {
            background: var(--btn-color);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #000;
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Press Effect */
        .btn:active {
            background: var(--accent-color);
            color: black;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        .empty { background: transparent; box-shadow: none; }

        /* Central Image Styling */
        .grid-center {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-center img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
            border: 2px solid var(--btn-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: border-color 0.3s ease;
        }

        /* Audio Button Styling */
        .btn-audio {
            margin-top: 45px;
            width: 180px;
            height: 60px;
            background: var(--audio-color);
            border-radius: 35px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 0 #b36500;
        }

        .btn-audio:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }
    </style>
</head>
<body ontouchstart="">

    <div id="status">Status: Disconnected</div>

    <div class="controller-grid">
        <div class="empty"></div>
        <button class="btn" id="btn-1">↑</button>
        <div class="empty"></div>

        <button class="btn" id="btn-4">←</button>
        <div class="grid-center">
            <img id="joey-img" src="joey-cover.png" alt="Joey">
        </div>
        <button class="btn" id="btn-3">→</button>

        <div class="empty"></div>
        <button class="btn" id="btn-2">↓</button>
        <div class="empty"></div>
    </div>

    <button class="btn btn-audio" id="btn-5">PLAY AUDIO 🎵</button>

    <script>
        // Connect to Socket.io server (Empty string auto-detects current host)
        const socket = io(); 
        const statusEl = document.getElementById('status');
        const joeyImg = document.getElementById('joey-img');
        let activeInterval = null;

        // Connection Events
        socket.on('connect', () => {
            statusEl.innerText = "Robo Joey: Online";
            statusEl.classList.add('connected');
            joeyImg.style.borderColor = "var(--accent-color)";
        });

        socket.on('disconnect', () => {
            statusEl.innerText = "Robo Joey: Offline";
            statusEl.classList.remove('connected');
            joeyImg.style.borderColor = "var(--btn-color)";
        });

        /**
         * Sends movement command to the server
         * @param {number} cmd - Command ID (1:Up, 2:Down, 3:Right, 4:Left, 0:Stop)
         */
        function sendCommand(cmd) {
            if (cmd === 0) {
                clearInterval(activeInterval);
                activeInterval = null;
                socket.emit('move', 0);
            } else {
                if (activeInterval) return; // Prevent multiple intervals
                
                socket.emit('move', cmd); // Send immediately
                // Keep sending every 50ms for ESP32 watchdog
                activeInterval = setInterval(() => {
                    socket.emit('move', cmd);
                }, 50);
            }
        }

        /**
         * Binds touch and mouse events to buttons
         */
        function bindButton(id, cmd) {
            const btn = document.getElementById('btn-' + id);
            
            // Mobile Touch Events
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                sendCommand(cmd); 
            });
            btn.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                sendCommand(0); 
            });
            
            // Desktop Mouse Events
            btn.addEventListener('mousedown', () => sendCommand(cmd));
            btn.addEventListener('mouseup', () => sendCommand(0));
            btn.addEventListener('mouseleave', () => { if(activeInterval) sendCommand(0); });
        }

        // Initialize directional buttons (1-4)
        [1, 2, 3, 4].forEach(id => bindButton(id, id));

        // Special handling for Audio (Trigger once on click/tap)
        const audioBtn = document.getElementById('btn-5');
        const triggerAudio = (e) => {
            e.preventDefault();
            socket.emit('move', 5);
            // Small timeout to send a Stop command after the trigger
            setTimeout(() => socket.emit('move', 0), 100);
        };
        audioBtn.addEventListener('touchstart', triggerAudio);
        audioBtn.addEventListener('mousedown', triggerAudio);

        // Service Worker registration for PWA features
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
